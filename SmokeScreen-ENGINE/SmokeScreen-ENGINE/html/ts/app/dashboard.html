<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard — SmokeScreen ENGINE</title>
  <style>
    :root{color-scheme:dark;--bg:#0f1115;--panel:#151826;--panel2:#0b0e18;--text:#e6e8ef;--muted:#97a1bd;--accent:#00e5ff;--danger:#ff3b5c;--ok:#41ff8b;--border:rgba(255,255,255,.08)}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial}
    a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}
    .container{max-width:980px;margin:0 auto;padding:24px}
    .top{display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap}
    h1{margin:0;font-size:18px;letter-spacing:.5px}
    .btn{padding:10px 12px;border-radius:10px;border:1px solid rgba(0,229,255,.35);background:rgba(0,229,255,.12);color:var(--text);cursor:pointer;font-weight:600}
    .btn.danger{border-color:rgba(255,59,92,.35);background:rgba(255,59,92,.08)}
    .grid{display:grid;grid-template-columns:1fr;gap:14px;margin-top:16px}
    @media (min-width:860px){.grid{grid-template-columns:1.1fr .9fr}}
    .card{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--border);border-radius:16px;padding:16px}
    .k{color:var(--muted);font-size:12px;margin:0 0 4px}
    .v{font-size:14px;margin:0 0 12px}
    .pill{display:inline-flex;align-items:center;gap:8px;padding:6px 10px;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,.03);font-size:12px;color:var(--muted)}
    .err{margin-top:12px;padding:10px 12px;border-radius:10px;border:1px solid rgba(255,59,92,.35);background:rgba(255,59,92,.08);color:#ffd2da;display:none}
  </style>
</head>
<body>
  <div class="container">
    <div class="top">
      <div>
        <h1>Dashboard</h1>
        <div class="pill" id="who">Loading...</div>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <a class="btn" id="adminLink" href="/admin" style="display:none">Admin panel</a>
        <button class="btn danger" id="logoutBtn" type="button">Logout</button>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <p class="k">Profile</p>
        <p class="v" id="profile"></p>
        <p class="k">Recent activity</p>
        <p class="v" style="color:var(--muted)">Activity feed is available to admins under <a href="/admin">/admin</a>.</p>
      </div>
      <div class="card">
        <p class="k">Session</p>
        <p class="v" id="session"></p>
        <p class="k">Security</p>
        <p class="v" style="color:var(--muted)">This app uses HTTP-only cookies, CSRF protection, and rate-limited login.</p>
      </div>
    </div>

    <div class="err" id="err"></div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    function showErr(msg) {
      $('err').textContent = msg || '';
      $('err').style.display = msg ? 'block' : 'none';
    }

    async function getCsrfToken() {
      const res = await fetch('/auth/csrf', { credentials: 'include' });
      if (!res.ok) throw new Error('Could not start session');
      const data = await res.json();
      return data.csrfToken;
    }

    async function loadMe() {
      const res = await fetch('/auth/me', { credentials: 'include' });
      if (res.status === 401) {
        window.location.href = '/auth/login';
        return;
      }
      const data = await res.json();
      const u = data.user;
      $('who').textContent = `${u.username} (${u.role})`;
      $('profile').textContent = `Email: ${u.email || '—'} | Created: ${new Date(Number(u.created_at || 0)).toLocaleString()}`;
      $('session').textContent = 'Authenticated';
      if (u.role === 'admin') $('adminLink').style.display = 'inline-flex';
    }

    $('logoutBtn').addEventListener('click', async () => {
      showErr('');
      try {
        const csrfToken = await getCsrfToken();
        await fetch('/auth/logout', {
          method: 'POST',
          headers: { 'csrf-token': csrfToken },
          credentials: 'include'
        });
      } catch (e) {
      } finally {
        window.location.href = '/auth/login';
      }
    });

    loadMe().catch(() => showErr('Could not load profile'));
  </script>
</body>
</html>
